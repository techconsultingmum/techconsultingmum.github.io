name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # ✅ Removes Node 20 warning (forces Node 24)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ✅ REQUIRED for Pages deployment
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # ✅ Vite output

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test production endpoints
        env:
          SITE_URL: https://agenticailab.in
        run: npm run smoke:test

      - name: Lighthouse production audit
        env:
          SITE_URL: https://agenticailab.in
          LIGHTHOUSE_MIN_PERFORMANCE: "0.70"
          LIGHTHOUSE_MIN_SEO: "0.90"
          LIGHTHOUSE_MAX_LCP_MS: "4000"
        run: npm run lighthouse:ci
